# SAM Configuration for PROD Environment
# Atlantis MCP Server - Phase 1 (Core Read-Only)
# 
# This configuration is used for local SAM deployments to the PROD environment
# For CI/CD deployments, use the Atlantis Configuration Repository scripts
#
# Usage:
#   sam build --config-file samconfig-prod.toml
#   sam deploy --config-file samconfig-prod.toml --guided
#
# Note: Replace placeholder values with your actual AWS account and configuration

version = 0.1

[default]
[default.global.parameters]
stack_name = "atlantis-mcp-prod"

[default.build.parameters]
cached = true
parallel = true

[default.validate.parameters]
lint = true

[default.deploy.parameters]
capabilities = "CAPABILITY_IAM"
confirm_changeset = true
resolve_s3 = true
region = "us-east-1"
image_repositories = []

# Parameter overrides for PROD environment
# These match the CloudFormation parameters in template.yml
parameter_overrides = [
    # Application Resource Naming
    "Prefix=acme",
    "ProjectId=atlantis-mcp",
    "StageId=prod",
    "S3BucketNameOrgPrefix=",
    "RolePath=/",
    "PermissionsBoundaryArn=",
    "ParameterStoreHierarchy=/",
    
    # Deployment Environment Information
    "DeployEnvironment=PROD",
    "DeployRole=arn:aws:iam::123456789012:role/CodeDeployServiceRole",
    "FunctionGradualDeploymentType=Linear10PercentEvery3Minutes",
    "AlarmNotificationEmail=ops@example.com",
    
    # Lambda Function Settings
    "FunctionTimeOutInSeconds=10",
    "FunctionMaxMemoryInMB=1024",
    "FunctionArchitecture=arm64",
    
    # Application Parameters
    "ApiPathBase=api",
    "UserAgent=Atlantis MCP Server",
    "LogRetentionInDaysForPROD=180",
    "LogRetentionInDaysForDEVTEST=7",
    "ApiGatewayLoggingEnabled=TRUE",
    
    # MCP Server Configuration
    "AtlantisS3Buckets=",
    "AtlantisGitHubUserOrgs=63Klabs",
    "ReadLambdaExecRoleIncludeManagedPolicyArns=",
    "GitHubTokenParameter=/atlantis-mcp/github/token",
    "LogLevel=INFO",
    
    # Cache TTL Settings (in seconds)
    "CacheTTLFullTemplateContent=3600",
    "CacheTTLTemplateVersionHistory=3600",
    "CacheTTLTemplateUpdates=3600",
    "CacheTTLTemplateList=1800",
    "CacheTTLAppStarterList=1800",
    "CacheTTLGitHubRepoList=1800",
    "CacheTTLS3BucketList=1800",
    "CacheTTLNamespaceList=1800",
    "CacheTTLCategoryList=1800",
    "CacheTTLDocumentationIndex=3600",
    
    # Cache-Data Settings
    "CacheDataDynamoDbTableName=",
    "CacheDataS3BucketName=",
    "CacheDataTimeZoneForInterval=Etc/UTC"
]

tags = [
    "Environment=PROD",
    "Application=AtlantisMCP",
    "ManagedBy=SAM"
]
