version: 0.2

# POST-DEPLOYMENT BUILDSPEC
# Orchestrates static site generation after the application CloudFormation stack deploys.
# Executes scripts in sequence to export the API spec, generate HTML docs, and sync to S3.
#
# Required environment variables (provided by the pipeline):
#   PREFIX, PROJECT_ID, STAGE_ID - CloudFormation stack name derivation
#   S3_STATIC_HOST_BUCKET        - Target S3 bucket for static hosting
#   PARAM_STORE_HIERARCHY         - Available but not directly used by these scripts

phases:
  install:
    runtime-versions:
      nodejs: latest
    commands:
      # Note: Redoc is loaded from CDN at runtime in the generated HTML (no CLI install needed)

      # Install Pandoc for markdown-to-HTML conversion
      # Pandoc is not available in Amazon Linux 2023 repos; install from official GitHub release
      - echo "Installing Pandoc..."
      - PANDOC_VERSION="${PANDOC_VERSION:-3.6.4}"
      - curl -sL "https://github.com/jgm/pandoc/releases/download/${PANDOC_VERSION}/pandoc-${PANDOC_VERSION}-linux-amd64.tar.gz" -o /tmp/pandoc.tar.gz
      - tar xzf /tmp/pandoc.tar.gz -C /tmp
      - cp /tmp/pandoc-${PANDOC_VERSION}/bin/pandoc /usr/local/bin/
      - rm -rf /tmp/pandoc* 

      # Print tool versions for build log debugging
      - echo "Tool versions:"
      - pandoc --version | head -n 1
      - node --version
      - aws --version

  build:
    commands:
      # >! Define PUBLIC_DOC_DIRS as a configurable variable controlling which doc directories are published.
      # >! Default includes tools, integration, use-cases, and troubleshooting. Does not include deployment or maintainer.
      - export PUBLIC_DOC_DIRS="${PUBLIC_DOC_DIRS:-tools integration use-cases troubleshooting}"
      - echo "PUBLIC_DOC_DIRS=${PUBLIC_DOC_DIRS}"

      # Create staging directory structure
      - mkdir -p build/staging/api-spec
      - mkdir -p build/staging/api-docs
      - mkdir -p build/staging/markdown-docs

      # Execute post-deploy scripts in sequence
      # >! Each script uses set -euo pipefail; a non-zero exit halts the build
      - echo "Running 01-export-api-spec.sh..."
      - bash -e application-infrastructure/postdeploy-scripts/01-export-api-spec.sh

      - echo "Running 02-generate-api-docs.sh..."
      - bash -e application-infrastructure/postdeploy-scripts/02-generate-api-docs.sh

      - echo "Running 03-generate-markdown-docs.sh..."
      - bash -e application-infrastructure/postdeploy-scripts/03-generate-markdown-docs.sh

      - echo "Running 04-consolidate-and-deploy.sh..."
      - bash -e application-infrastructure/postdeploy-scripts/04-consolidate-and-deploy.sh

      - echo "Post-deployment static generation complete"
