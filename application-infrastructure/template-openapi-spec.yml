openapi: '3.0.0'
info:
  title: "Atlantis MCP Server API"
  description: "Model Context Protocol server for Atlantis Templates and Scripts Platform - provides read-only operations for template discovery, starter code, and documentation search via JSON-RPC 2.0"
  version: "0.0.1"
  contact:
    name: "63klabs.net"
    url: "https://github.com/63klabs/atlantis-mcp"
  license:
    name: "Distributed on an AS IS BASIS"
    url: "https://github.com/63klabs/atlantis-mcp/blob/main/LICENSE.txt"

# =============================================================================
# PATHS - MCP Endpoints
# =============================================================================

paths:

  /mcp/v1:
    post:
      summary: "MCP JSON-RPC 2.0 endpoint"
      description: "JSON-RPC 2.0 endpoint for all MCP protocol operations including initialize, tools/list, and tools/call"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPRequest'
      responses:
        '200':
          description: "Success response"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPResponse'
        '400':
          description: "Bad request - invalid JSON-RPC 2.0 message"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPError'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPError'
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReadLambdaFunction.Arn}/invocations

# =============================================================================
# COMPONENTS - Reusable Schemas
# =============================================================================

components:

  schemas:

    # MCP Protocol Request Schema (JSON-RPC 2.0)
    MCPRequest:
      type: object
      required:
        - jsonrpc
        - method
        - id
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
          description: "JSON-RPC protocol version"
          example: "2.0"
        method:
          type: string
          description: "MCP method name to invoke (initialize, tools/list, tools/call)"
          example: "tools/call"
        params:
          type: object
          description: "Method-specific parameters (optional)"
          example:
            name: "list_templates"
            arguments:
              category: "storage"
        id:
          oneOf:
            - type: string
            - type: number
          description: "Unique request identifier"
          example: "req-123"

    # MCP Protocol Success Response Schema (JSON-RPC 2.0)
    MCPResponse:
      type: object
      required:
        - jsonrpc
        - result
        - id
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
          description: "JSON-RPC protocol version"
          example: "2.0"
        result:
          type: object
          description: "Method result data"
          example:
            content:
              - type: "text"
                text: '{"templates": [...]}'
        id:
          oneOf:
            - type: string
            - type: number
          description: "Request identifier matching the request"
          example: "req-123"

    # MCP Protocol Error Response Schema (JSON-RPC 2.0)
    MCPError:
      type: object
      required:
        - jsonrpc
        - error
        - id
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
          description: "JSON-RPC protocol version"
          example: "2.0"
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
              description: "Error code (JSON-RPC standard codes)"
              example: -32600
            message:
              type: string
              description: "Human-readable error message"
              example: "Invalid Request"
            data:
              type: object
              description: "Additional error information (optional)"
              example:
                details: "Missing required parameter: namespace"
        id:
          oneOf:
            - type: string
            - type: number
            - type: 'null'
          description: "Request identifier or null if request ID could not be determined"
          example: "req-123"
