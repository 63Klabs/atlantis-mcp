            application/json:
              schema:
                $ref: '#/components/schemas/MCPError'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPError'
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReadLambdaFunction.Arn}/invocations

  /mcp/get_starter_info:
    post:
      summary: "Get starter information"
      description: "Returns detailed information about a specific application starter"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPRequest'
      responses:
        '200':
          description: "Success response with starter information"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPResponse'
        '400':
