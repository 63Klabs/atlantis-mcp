# =============================================================================
# COMPONENTS - Reusable Schemas
# =============================================================================

components:

  schemas:

    # MCP Protocol Request Schema (JSON-RPC 2.0)
    MCPRequest:
      type: object
      required:
        - jsonrpc
        - method
        - id
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
          description: "JSON-RPC protocol version"
          example: "2.0"
        method:
          type: string
          description: "MCP method name to invoke"
          example: "list_templates"
        params:
          type: object
          description: "Method-specific parameters (optional)"
          example:
            namespace: "atlantis"
            category: "serverless"
        id:
          oneOf:
            - type: string
            - type: number
          description: "Unique request identifier"
          example: "req-123"

    # MCP Protocol Success Response Schema (JSON-RPC 2.0)
    MCPResponse:
      type: object
      required:
        - jsonrpc
        - result
        - id
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
          description: "JSON-RPC protocol version"
          example: "2.0"
        result:
          type: object
          description: "Method result data"
          example:
            templates:
              - name: "serverless-api"
                version: "1.0.0"
                description: "Serverless API template"
        id:
          oneOf:
            - type: string
            - type: number
          description: "Request identifier matching the request"
          example: "req-123"

    # MCP Protocol Error Response Schema (JSON-RPC 2.0)
    MCPError:
      type: object
      required:
        - jsonrpc
        - error
        - id
      properties:
        jsonrpc:
          type: string
          enum: ['2.0']
          description: "JSON-RPC protocol version"
          example: "2.0"
        error:
          type: object
          required:
            - code
            - message
          properties:
            code:
              type: integer
              description: "Error code (JSON-RPC standard codes)"
              example: -32600
            message:
              type: string
              description: "Human-readable error message"
              example: "Invalid Request"
            data:
              type: object
              description: "Additional error information (optional)"
              example:
                details: "Missing required parameter: namespace"
        id:
          oneOf:
            - type: string
            - type: number
            - type: 'null'
          description: "Request identifier or null if request ID could not be determined"
          example: "req-123"
