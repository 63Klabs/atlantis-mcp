openapi: '3.0.0'
info:
  title: "Atlantis MCP Server API"
  description: "Model Context Protocol server for Atlantis Templates and Scripts Platform - provides read-only operations for template discovery, starter code, and documentation search"
  version: "0.0.1"
  contact:
    name: "63klabs.net"
    url: "https://github.com/63Klabs/atlantis-mcp-server"
  license:
    name: "Distributed on an AS IS BASIS"
    url: "https://github.com/63Klabs/atlantis-mcp-server/blob/main/LICENSE.txt"

# =============================================================================
# PATHS - MCP Endpoints
# =============================================================================

paths:

  /mcp/list_templates:
    post:
      summary: "List available templates"
      description: "Returns a list of available Atlantis templates from configured S3 buckets and GitHub repositories"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPRequest'
      responses:
        '200':
          description: "Success response with template list"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPResponse'
        '400':
          description: "Bad request - invalid MCP protocol message"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPError'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPError'
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReadLambdaFunction.Arn}/invocations

  /mcp/get_template:
    post:
      summary: "Get template content"
      description: "Returns the full content of a specific template including metadata and file contents"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPRequest'
      responses:
        '200':
          description: "Success response with template content"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPResponse'
        '400':
          description: "Bad request - invalid MCP protocol message"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPError'
        '404':
          description: "Template not found"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPError'
        '500':
          description: "Internal server error"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPError'
      x-amazon-apigateway-integration:
        httpMethod: post
        type: aws_proxy
        uri:
          Fn::Sub: arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ReadLambdaFunction.Arn}/invocations

  /mcp/list_starters:
    post:
      summary: "List available application starters"
      description: "Returns a list of available application starter templates"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/MCPRequest'
      responses:
        '200':
          description: "Success response with starter list"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/MCPResponse'
        '400':
