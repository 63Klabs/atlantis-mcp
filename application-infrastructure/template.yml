      ExtArn: "arn:aws:lambda:us-west-2:345057560386:layer:AWS-Parameters-and-Secrets-Lambda-Extension-Arm64:61"

# =============================================================================
# CONDITIONS
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/intrinsic-function-reference-conditions.html
#

Conditions:
  IsProduction: !Equals [!Ref DeployEnvironment, "PROD"]
  # IsNotProduction: !Not [!Equals [!Ref DeployEnvironment, "PROD"]]
  # IsTest: !Equals [!Ref DeployEnvironment, "TEST"]
  # IsDevelopment: !Equals [!Ref DeployEnvironment, "DEV"]
  IsNotDevelopment: !Not [!Equals [!Ref DeployEnvironment, "DEV"]]
  CreateProdResources: !Equals [!Ref DeployEnvironment, "PROD"]
  # CreateTestResources: !Equals [!Ref DeployEnvironment, "TEST"]
  # CreateDevResources: !Equals [!Ref DeployEnvironment, "DEV"]
  # UseS3BucketNameOrgPrefix: !Not [!Equals [!Ref S3BucketNameOrgPrefix, ""]]
  CreateAlarms: !Equals [!Ref DeployEnvironment, "PROD"] # !Equals ["ALWAYS", "ALWAYS"] # Option if you want to ALWAYS create an alarm or only in PROD. Alarms cost money so you may only want them in Prod (or temporarily in test)
  HasPermissionsBoundaryArn: !Not [!Equals [!Ref PermissionsBoundaryArn, ""]]
  IsArmArch: !Equals [!Ref FunctionArchitecture, "arm64"]
  ApiGatewayLoggingIsEnabled: !Equals [!Ref ApiGatewayLoggingEnabled, "TRUE"]
  HasCacheDataDynamoDbTableName: !Not [!Equals [!Ref CacheDataDynamoDbTableName, ""]]
  HasCacheDataS3BucketName: !Not [!Equals [!Ref CacheDataS3BucketName, ""]]
  HasCacheDataStorageStack: !Not [!And [!Condition HasCacheDataDynamoDbTableName, !Condition HasCacheDataS3BucketName]]
  HasReadLambdaManagedPolicies: !Not [!Equals [!Join ['', !Ref ReadLambdaExecRoleIncludeManagedPolicyArns], '']]

# =============================================================================
# GLOBALS
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-specification-template-anatomy-globals.html
#

Globals:
  Api:
    OpenApiVersion: 3.0.0 #>! Prevents extra stage called Stage in API Gateway https://www.internetkatta.com/how-to-prevent-aws-sam-from-creating-the-default-stage-in-api-gateway-stage
    PropagateTags: True
    TracingEnabled: !If [ IsNotDevelopment, True,  False] # X-Ray

  Function:
    PropagateTags: True
    Tracing: !If [ IsNotDevelopment, "Active", !Ref 'AWS::NoValue'] # X-Ray

  # StateMachine:
  #   PropagateTags: True

# =============================================================================
# RESOURCES
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/resources-section-structure.html  
#

Resources:

  # ---------------------------------------------------------------------------
  # API Gateway
  # https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-api.html#sam-api-minimumcompressionsize

  # -- API Gateway --
  WebApi:
    Type: AWS::Serverless::Api 
    Properties: 
      Name: !Sub '${Prefix}-${ProjectId}-${StageId}-WebApi'
      StageName: !Ref ApiPathBase

      Cors: # MCP server accepts POST requests from any origin
        AllowMethods: "'POST,OPTIONS'"
        AllowHeaders: "'Content-Type,X-Amz-Date,Authorization,X-Api-Key,X-Amz-Security-Token'"
        AllowOrigin: "'*'"
        MaxAge: "'86400'"

      DefinitionBody:
        "Fn::Transform":
          Name: "AWS::Include"
          Parameters:
            Location: ./template-openapi-spec.yml

      # -- The following adds two levels of logging to API Gateway --
      # -- However, an account admin will need to add a service role to allow API Gateway to write to CloudWatch logs --
      # -- See https://docs.aws.amazon.com/apigateway/latest/developerguide/set-up-logging.html --

      # Add API Gateway logging configuration
      AccessLogSetting: !If
        - ApiGatewayLoggingIsEnabled
        - DestinationArn: !GetAtt ApiGatewayAccessLogGroup.Arn
          Format: '{"requestId":"$context.requestId", "extendedRequestId":"$context.extendedRequestId", "ip":"$context.identity.sourceIp", "caller":"$context.identity.caller", "user":"$context.identity.user", "requestTime":"$context.requestTime", "httpMethod":"$context.httpMethod", "path":"$context.path", "resourcePath":"$context.resourcePath", "routeKey":"$context.routeKey", "status":"$context.status", "protocol":"$context.protocol", "responseLength":"$context.responseLength", "integrationError":"$context.integrationErrorMessage", "authorizerError":"$context.authorizer.error", "authorizerStatus":"$context.authorizer.status", "authorizerLatency":"$context.authorizer.latency"}'
        - !Ref 'AWS::NoValue'
      
      # Add execution logging to CloudWatch
      MethodSettings: !If
        - ApiGatewayLoggingIsEnabled
        - - LoggingLevel: !If [IsProduction, 'ERROR', 'INFO']
            ResourcePath: '/*'
            HttpMethod: '*'
            DataTraceEnabled: !If [IsProduction, False, True]
            MetricsEnabled: True
        - !Ref 'AWS::NoValue'
  
  # Add CloudWatch Log Group for API Gateway Access Logs
  ApiGatewayAccessLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: ApiGatewayLoggingIsEnabled
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/apigateway/${Prefix}-${ProjectId}-${StageId}-WebApi-access-logs'
      RetentionInDays: !If [ IsProduction, !Ref LogRetentionInDaysForPROD,  !Ref LogRetentionInDaysForDEVTEST]

  # Add CloudWatch Log Group for API Gateway Execution Logs
  ApiGatewayExecutionLogGroup:
    Type: AWS::Logs::LogGroup
    Condition: ApiGatewayLoggingIsEnabled
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub 'API-Gateway-Execution-Logs_${WebApi}/${ApiPathBase}' # AWS default
      RetentionInDays: !If [ IsProduction, !Ref LogRetentionInDaysForPROD,  !Ref LogRetentionInDaysForDEVTEST]

  # ---------------------------------------------------------------------------
  # Lambda Functions
  # https://docs.aws.amazon.com/serverless-application-model/latest/developerguide/sam-resource-function.html
  #

  # -- Read Lambda Function (Phase 1) --
  # Handles all read-only MCP operations with minimal AWS permissions

  ReadLambdaFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${Prefix}-${ProjectId}-${StageId}-ReadFunction'
      Description: "MCP Server Read-Only Operations - Template discovery, starter code, documentation search"

      VersionDescription: "MCP Server Read Lambda Version"
      AutoPublishCodeSha256: "20260224T000000"
      AutoPublishAlias: live

      DeploymentPreference:
        Enabled: !If [ IsProduction, True,  False]
        Type: !If [ IsProduction, !Ref FunctionGradualDeploymentType, "AllAtOnce"]
        Role: !Ref DeployRole
        Alarms:
          Fn::If:
            - CreateAlarms
            - - !Ref ReadLambdaErrorsAlarm
            - - !Ref 'AWS::NoValue'

      CodeUri: src/lambda/read/
      Handler: index.handler
      Runtime: nodejs24.x
      Architectures:
        - !Ref FunctionArchitecture
      Timeout: !Ref FunctionTimeOutInSeconds
      MemorySize: !Ref FunctionMaxMemoryInMB
      Role: !GetAtt ReadLambdaExecutionRole.Arn

      Layers:
        - !If
          - IsArmArch
          - !FindInMap [LambdaInsightsArm, !Ref 'AWS::Region', ExtArn]
          - !FindInMap [LambdaInsightsX86, !Ref 'AWS::Region', ExtArn]
        - !If
          - IsArmArch
          - !FindInMap [LambdaParamSecretsArm, !Ref 'AWS::Region', ExtArn]
          - !FindInMap [LambdaParamSecretsX86, !Ref 'AWS::Region', ExtArn]

      Environment:
        Variables:
          userAgentIdentifier: !Ref UserAgent
          lambdaTimeoutInSeconds: !Ref FunctionTimeOutInSeconds

          NODE_ENV: "production"
          DEPLOY_ENVIRONMENT: !Ref DeployEnvironment
          LOG_LEVEL: !If [ IsProduction, "INFO", "DEBUG"] # 0-2 (ERROR, WARN, INFO) for prod, 3-5 (MSG, DIAG, DEBUG) for non-prod
          PARAM_STORE_PATH: !Ref ParameterStoreHierarchy

          PARAMETERS_SECRETS_EXTENSION_LOG_LEVEL: !If [ IsProduction, "INFO", "DEBUG"] # 'DEBUG', 'WARN', 'ERROR', 'NONE', 'INFO'
          AWS_LAMBDA_LOG_LEVEL: !If [ IsProduction, "INFO", "DEBUG"] # 'DEBUG', 'WARN', 'ERROR', 'INFO' - 'CRITICAL' and 'SILENT' are not currently recognized by Cache Data logging
          AWS_LAMBDA_LOG_FORMAT: 'text'

          # MCP Server Configuration
          ATLANTIS_S3_BUCKETS: !Join [',', !Ref AtlantisS3Buckets]
          ATLANTIS_GITHUB_USER_ORGS: !Join [',', !Ref AtlantisGitHubUserOrgs]

          # Cache TTL Settings (in seconds)
          CACHE_TTL_FULL_TEMPLATE_CONTENT: !Ref CacheTTLFullTemplateContent
          CACHE_TTL_TEMPLATE_VERSION_HISTORY: !Ref CacheTTLTemplateVersionHistory
          CACHE_TTL_TEMPLATE_UPDATES: !Ref CacheTTLTemplateUpdates
          CACHE_TTL_TEMPLATE_LIST: !Ref CacheTTLTemplateList
          CACHE_TTL_APP_STARTER_LIST: !Ref CacheTTLAppStarterList
          CACHE_TTL_GITHUB_REPO_LIST: !Ref CacheTTLGitHubRepoList
          CACHE_TTL_S3_BUCKET_LIST: !Ref CacheTTLS3BucketList
          CACHE_TTL_NAMESPACE_LIST: !Ref CacheTTLNamespaceList
          CACHE_TTL_CATEGORY_LIST: !Ref CacheTTLCategoryList
          CACHE_TTL_DOCUMENTATION_INDEX: !Ref CacheTTLDocumentationIndex

          # Cache-Data Settings
          CACHE_DATA_TIME_ZONE_FOR_INTERVAL: !Ref CacheDataTimeZoneForInterval
          CACHE_DATA_AWS_X_RAY_ON: true
          CACHE_DATA_USE_TOOLS_HASH_METHOD: true
          CACHE_DATA_DYNAMO_DB_TABLE: !If 
            - HasCacheDataDynamoDbTableName
            - !Ref CacheDataDynamoDbTableName
            - Fn::ImportValue:
                'Fn::Sub': '${Prefix}-CacheDataDynamoDbTable'
          CACHE_DATA_S3_BUCKET: !If 
            - HasCacheDataS3BucketName
            - !Ref CacheDataS3BucketName
            - Fn::ImportValue:
                'Fn::Sub': '${Prefix}-CacheDataS3Bucket'

          # Rate Limiter Sessions Table
          MCP_DYNAMODB_SESSIONS_TABLE: !Ref DynamoDbSessions

          # Documentation Index Table
          DOC_INDEX_TABLE: !Ref DocIndexTable

      Events:
        McpV1Post:
          Type: Api
          Properties:
            Path: /mcp/v1
            Method: post
            RestApiId: !Ref WebApi

  # -- Write Lambda Function (Phase 2 - Placeholder) --
  # Uncomment and configure in Phase 2 for write operations
  # WriteLambdaFunction:
  #   Type: AWS::Serverless::Function
  #   Properties:
  #     FunctionName: !Sub '${Prefix}-${ProjectId}-${StageId}-WriteFunction'
  #     Description: "MCP Server Write Operations - Repository creation, template modification"
  #     CodeUri: src/lambda/write/
  #     Handler: index.handler
  #     Runtime: nodejs24.x
  #     Architectures:
  #       - !Ref FunctionArchitecture
  #     Timeout: !Ref FunctionTimeOutInSeconds
  #     MemorySize: !Ref FunctionMaxMemoryInMB
  #     Role: !GetAtt WriteLambdaExecutionRole.Arn
  #     # ... additional configuration for write operations

  # -- DynamoDB Sessions Table for Rate Limiting --
  # Stores per-client rate limit counters with atomic updates and TTL cleanup

  DynamoDbSessions:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${Prefix}-${ProjectId}-${StageId}-sessions'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref StageId
        - Key: Project
          Value: !Ref ProjectId
        - Key: ManagedBy
          Value: CloudFormation

  # -- DocIndex DynamoDB Table --
  # Stores indexed documentation content, main index, search keywords, and version pointers

  DocIndexTable:
    Type: AWS::DynamoDB::Table
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: Retain
    Properties:
      TableName: !Sub '${Prefix}-${ProjectId}-${StageId}-DocIndex'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: Environment
          Value: !Ref StageId
        - Key: Project
          Value: !Ref ProjectId
        - Key: ManagedBy
          Value: CloudFormation

  # -- Doc Indexer Lambda Function --
  # Scheduled Lambda that builds the persistent DynamoDB documentation index

  DocIndexerFunction:
    Type: AWS::Serverless::Function
    Properties:
      FunctionName: !Sub '${Prefix}-${ProjectId}-${StageId}-DocIndexer'
      Description: "Documentation Indexer - Builds persistent DynamoDB index from GitHub repositories"
      CodeUri: src/lambda/indexer/
      Handler: index.handler
      Runtime: nodejs24.x
      Architectures:
        - !Ref FunctionArchitecture
      Timeout: 900
      MemorySize: 1024
      Role: !GetAtt DocIndexerExecutionRole.Arn

      Layers:
        - !If
          - IsArmArch
          - !FindInMap [LambdaParamSecretsArm, !Ref 'AWS::Region', ExtArn]
          - !FindInMap [LambdaParamSecretsX86, !Ref 'AWS::Region', ExtArn]

      Environment:
        Variables:
          ATLANTIS_GITHUB_USER_ORGS: !Join [',', !Ref AtlantisGitHubUserOrgs]
          DOC_INDEX_TABLE: !Ref DocIndexTable
          PARAM_STORE_PATH: !Ref ParameterStoreHierarchy
          DEPLOY_ENVIRONMENT: !Ref DeployEnvironment

  # -- Doc Indexer Lambda Log Group --

  DocIndexerLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: Retain
    Properties:
      LogGroupName: !Sub '/aws/lambda/${Prefix}-${ProjectId}-${StageId}-DocIndexer'
      RetentionInDays: !If [ IsProduction, !Ref LogRetentionInDaysForPROD, !Ref LogRetentionInDaysForDEVTEST]

  # -- Doc Indexer Execution Role --
  # DynamoDB read/write on DocIndex table, SSM GetParameter for GitHubToken, CloudWatch Logs

  DocIndexerExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Prefix}-${ProjectId}-${StageId}-DocIndexerRole"
      Description: "IAM Role for Doc Indexer Lambda with DynamoDB write and SSM read permissions"
      Path: !Ref RolePath
      PermissionsBoundary: !If [HasPermissionsBoundaryArn, !Ref PermissionsBoundaryArn, !Ref 'AWS::NoValue']

      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service: [lambda.amazonaws.com]
          Action: sts:AssumeRole

      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess'

      Policies:
      - PolicyName: DocIndexerResourceAccessPolicies
        PolicyDocument:
          Statement:

          - Sid: LambdaAccessToWriteLogs
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            Effect: Allow
            Resource: !GetAtt DocIndexerLogGroup.Arn

          - Sid: LambdaAccessToSSMParameters
            Action:
            - ssm:GetParameter
            Effect: Allow
            Resource:
            - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ParameterStoreHierarchy}*"

          - Sid: DocIndexTableReadWriteAccess
            Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            - dynamodb:BatchWriteItem
            - dynamodb:Query
            Effect: Allow
            Resource:
            - !GetAtt DocIndexTable.Arn

  # -- EventBridge Schedule for Doc Indexer --

  DocIndexerScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub '${Prefix}-${ProjectId}-${StageId}-DocIndexerSchedule'
      Description: "Scheduled trigger for Documentation Indexer Lambda"
      ScheduleExpression: !If [IsProduction, !Ref DocIndexScheduleForPROD, !Ref DocIndexScheduleForDEVTEST]
      State: ENABLED
      Targets:
        - Arn: !GetAtt DocIndexerFunction.Arn
          Id: DocIndexerTarget

  DocIndexerSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !GetAtt DocIndexerFunction.Arn
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DocIndexerScheduleRule.Arn

  # -- Read Lambda Execution Role --
  # Minimal permissions: S3 GetObject/ListBucket/GetObjectVersion, DynamoDB read, SSM GetParameter

  ReadLambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Prefix}-${ProjectId}-${StageId}-ReadExecutionRole"
      Description: "IAM Role for Read Lambda with minimal read-only permissions"
      Path: !Ref RolePath
      PermissionsBoundary: !If [HasPermissionsBoundaryArn, !Ref PermissionsBoundaryArn, !Ref 'AWS::NoValue' ]

      AssumeRolePolicyDocument:
        Statement:
        - Effect: Allow
          Principal:
            Service: [lambda.amazonaws.com]
          Action: sts:AssumeRole

      ManagedPolicyArns:
        - 'arn:aws:iam::aws:policy/CloudWatchLambdaInsightsExecutionRolePolicy'
        - 'arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess'
        - !If
          - HasCacheDataStorageStack
          - Fn::ImportValue:
              'Fn::Sub': '${Prefix}-CacheDataManagedLambdaExecutionRolePolicy'
          - !Ref 'AWS::NoValue'

      Policies:
      - PolicyName: ReadLambdaResourceAccessPolicies
        PolicyDocument:
          Statement:

          - Sid: LambdaAccessToWriteLogs
            Action:
            - logs:CreateLogGroup
            - logs:CreateLogStream
            - logs:PutLogEvents
            Effect: Allow
            Resource: !GetAtt ReadLambdaLogGroup.Arn

          - Sid: LambdaAccessToSSMParameters
            Action:
            - ssm:DescribeParameters
            - ssm:GetParameters
            - ssm:GetParameter
            - ssm:GetParametersByPath
            Effect: Allow
            Resource: 
            - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter${ParameterStoreHierarchy}*"

          - Sid: S3ReadOnlyAccess
            Action:
            - s3:GetObject
            - s3:GetObjectVersion
            - s3:ListBucket
            - s3:ListBucketVersions
            - s3:GetBucketTagging
            Effect: Allow
            Resource:
            - !Sub "arn:aws:s3:::*" # TODO: Scope - CDK generated managed policy?
            - !Sub "arn:aws:s3:::*/*" # TODO: Scope

          - Sid: DynamoDBReadOnlyAccess
            Action:
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:Scan
            - dynamodb:BatchGetItem
            Effect: Allow
            Resource:
            - !If
              - HasCacheDataDynamoDbTableName
              - !Sub "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${CacheDataDynamoDbTableName}"
              - Fn::Sub:
                - "arn:aws:dynamodb:${AWS::Region}:${AWS::AccountId}:table/${TableName}"
                - TableName:
                    Fn::ImportValue: !Sub '${Prefix}-CacheDataDynamoDbTable'

          - Sid: DynamoDBSessionsTableAccess
            Action:
            - dynamodb:GetItem
            - dynamodb:PutItem
            - dynamodb:UpdateItem
            Effect: Allow
            Resource:
            - !GetAtt DynamoDbSessions.Arn

          - Sid: DocIndexTableReadAccess
            Action:
            - dynamodb:GetItem
            - dynamodb:Query
            - dynamodb:BatchGetItem
            Effect: Allow
            Resource:
            - !GetAtt DocIndexTable.Arn

  # -- Lambda permissions allowing API Gateway to Execute Read Lambda --

  ReadLambdaPermission:
    Type: "AWS::Lambda::Permission"
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Sub "${ReadLambdaFunction}"
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebApi}/*"

  ReadLambdaPermissionLive:
    Type: "AWS::Lambda::Permission"
    Condition: IsProduction
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref ReadLambdaFunction.Alias
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${WebApi}/*"

  # -- Log Group with retention policy --

  ReadLambdaLogGroup:
    Type: AWS::Logs::LogGroup
    DeletionPolicy: !If [IsProduction, Retain, Delete]
    UpdateReplacePolicy: Retain
    Properties: 
      LogGroupName: !Sub '/aws/lambda/${Prefix}-${ProjectId}-${StageId}-ReadFunction'
      RetentionInDays: !If [ IsProduction, !Ref LogRetentionInDaysForPROD,  !Ref LogRetentionInDaysForDEVTEST]

  # ---------------------------------------------------------------------------
  # CloudWatch Alarms and Dashboards

  # -- Read Lambda Function Error Alarm --

  ReadLambdaErrorsAlarm:
    Type: "AWS::CloudWatch::Alarm"
    Condition: CreateAlarms # Either PROD or ALWAYS - Check Conditions
    Properties:
      AlarmDescription: Read Lambda Function Error > 1
      MetricName: Errors
      Statistic: Sum
      ComparisonOperator: GreaterThanThreshold
      Threshold: 1
      Period: 900
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref ReadLambdaFunction
      AlarmActions:
        - Ref: ReadLambdaErrorAlarmNotification

  # -- Read Lambda Function Notification for Error Alarm --

  ReadLambdaErrorAlarmNotification:
      Type: AWS::SNS::Topic
      Condition: CreateAlarms # Either PROD or ALWAYS - Check Conditions
      Properties: 
        DisplayName: !Sub 'AWS-Alarm-${Prefix}-${ProjectId}-${StageId}'
        FifoTopic: false
        Subscription:
          - Endpoint: !Ref AlarmNotificationEmail
            Protocol: 'email'

  # -- ApiGateway Error Alarm --

  ApiGatewayErrorsAlarm:
    Type: "AWS::CloudWatch::Alarm"
    Condition: CreateAlarms # Either PROD or ALWAYS - Check Conditions
    Properties:
      AlarmDescription: API Gateway Error > 1
      MetricName: Errors
      Statistic: Sum
      ComparisonOperator: GreaterThanThreshold
      Threshold: 1
      Period: 900
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      Namespace: AWS/ApiGateway
      Dimensions:
        - Name: ApiName
          Value: !Ref WebApi
      AlarmActions:
        - Ref: ApiGatewayErrorAlarmNotification

  # -- ApiGateway Notification for Error Alarm --

  ApiGatewayErrorAlarmNotification:
      Type: AWS::SNS::Topic
      Condition: CreateAlarms # Either PROD or ALWAYS - Check Conditions
      Properties: 
        DisplayName: !Sub 'AWS-Alarm-${Prefix}-${ProjectId}-${StageId}'
        FifoTopic: false
        Subscription:
          - Endpoint: !Ref AlarmNotificationEmail
            Protocol: 'email'

  # -- Read Lambda Function Latency Alarm --

  ReadLambdaLatencyAlarm:
    Type: "AWS::CloudWatch::Alarm"
    Condition: CreateAlarms # Either PROD or ALWAYS - Check Conditions
    Properties:
      AlarmDescription: Read Lambda Function Duration > 5000ms
      MetricName: Duration
      Statistic: Average
      ComparisonOperator: GreaterThanThreshold
      Threshold: 5000
      Period: 300
      EvaluationPeriods: 2
      TreatMissingData: notBreaching
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref ReadLambdaFunction
      AlarmActions:
        - Ref: ReadLambdaErrorAlarmNotification
  
  # -- Doc Indexer Lambda Function Error Alarm --

  DocIndexerErrorsAlarm:
    Type: "AWS::CloudWatch::Alarm"
    Condition: CreateAlarms
    Properties:
      AlarmDescription: Doc Indexer Lambda Function Error > 1
      MetricName: Errors
      Statistic: Sum
      ComparisonOperator: GreaterThanThreshold
      Threshold: 1
      Period: 900
      EvaluationPeriods: 1
      TreatMissingData: notBreaching
      Namespace: AWS/Lambda
      Dimensions:
        - Name: FunctionName
          Value: !Ref DocIndexerFunction
      AlarmActions:
        - Ref: DocIndexerErrorAlarmNotification

  # -- Doc Indexer Lambda Function Notification for Error Alarm --

  DocIndexerErrorAlarmNotification:
      Type: AWS::SNS::Topic
      Condition: CreateAlarms
      Properties:
        DisplayName: !Sub 'AWS-Alarm-${Prefix}-${ProjectId}-${StageId}-DocIndexer'
        FifoTopic: false
        Subscription:
          - Endpoint: !Ref AlarmNotificationEmail
            Protocol: 'email'

  # -- CloudWatch Dashboard --

  Fn::Transform:
    Name: AWS::Include
    Parameters:
      Location: ./template-dashboard.yml
      
# =============================================================================
# OUTPUTS
# -----------------------------------------------------------------------------
# https://docs.aws.amazon.com/AWSCloudFormation/latest/UserGuide/outputs-section-structure.html
#
# Place anything interesting that you would like to quickly refer to in 
# your cloudformation OUTPUT section. Test URLs, direct links to resources, etc
#

Outputs:

  # -- MCP Endpoint examples
  ApiEndpoint:
    Description: "MCP Server API Endpoint URL"
    Value: !Sub "https://${WebApi}.execute-api.${AWS::Region}.amazonaws.com/${ApiPathBase}/mcp/"

  # -- CloudWatch Log Groups
  CloudWatchReadLambdaExecutionLogGroup:
    Description: "Cloud Watch Log Group for Read Lambda Execution Logs"
    Value: !Sub "https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logStream:group=%2Faws%2Flambda%2F${ReadLambdaFunction}"

  CloudWatchApiGatewayExecutionLogGroup:
    Condition: ApiGatewayLoggingIsEnabled
    Description: "Cloud Watch Log Group for API Gateway Execution Logs"
    Value: !Sub "https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logStream:group=%2Faws%2Fapigateway%2FAPI-Gateway-Execution-Logs_${WebApi}/${ApiPathBase}"

  CloudWatchApiGatewayAccessLogGroup:
    Condition: ApiGatewayLoggingIsEnabled
    Description: "Cloud Watch Log Group for API Gateway Access Logs"
    Value: !Sub "https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#logStream:group=%2Faws%2Fapigateway%2F${Prefix}-${ProjectId}-${StageId}-WebApi-access-logs"

  CloudWatchDashboard:
    Condition: CreateProdResources
    Description: "Cloud Watch Dashboard (for production environments only)"
    Value: !Sub 'https://console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#dashboards:name=${Prefix}-${ProjectId}-${StageId}-Dashboard'

  # -- Resource quick links
  ReadLambdaWebConsole:
    Description: "Read Lambda Web Console"
    Value: !Sub "https://console.aws.amazon.com/lambda/home?region=${AWS::Region}#/functions/${ReadLambdaFunction}?tab=code"

  ParameterStore:
    Description: "SSM Parameter Store"
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}&tab=Table#list_parameter_filters=Name:Contains:${ParameterStoreHierarchy}"