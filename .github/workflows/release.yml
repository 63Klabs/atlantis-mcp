name: Create Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  packages: write

jobs:
  create-release:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Extract version from tag
        id: version
        run: |
          VERSION=${GITHUB_REF#refs/tags/v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Extract changelog for this version
        id: changelog
        run: |
          VERSION=${{ steps.version.outputs.tag }}
          
          # Extract changelog section for this version
          CHANGELOG_CONTENT=$(awk "/^## $VERSION/,/^## v[0-9]/" CHANGELOG.md | sed '$d' | tail -n +2)
          
          # If no specific version found, use unreleased section
          if [ -z "$CHANGELOG_CONTENT" ]; then
            CHANGELOG_CONTENT=$(awk '/^## .*unreleased/,/^## v[0-9]/' CHANGELOG.md | sed '$d' | tail -n +2)
          fi
          
          # Save to file for GitHub release
          echo "$CHANGELOG_CONTENT" > release-notes.md
          
          # Also output for debugging
          echo "Changelog content:"
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ steps.version.outputs.tag }}
          body_path: release-notes.md
          draft: false
          prerelease: false
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create release artifact
        run: |
          # Create zip file excluding unnecessary files
          zip -r atlantis-mcp-server-${{ steps.version.outputs.version }}.zip . \
            -x "*.git/*" \
            -x "*.DS_Store" \
            -x "*.env*" \
            -x "*.vscode/*" \
            -x "*__pycache__/*" \
            -x "*/node_modules/*" \
            -x "*.kiro/*" \
            -x "*/.aws-sam/*" \
            -x "*/coverage/*" \
            -x "*/test-results/*"

      - name: Upload release artifact
        uses: softprops/action-gh-release@v2
        with:
          files: atlantis-mcp-server-${{ steps.version.outputs.version }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  trigger-s3-deployment:
    needs: create-release
    runs-on: ubuntu-latest
    
    steps:
      - name: Trigger S3 deployment workflow
        run: |
          echo "Release created successfully. S3 deployment will be triggered by the 'published' event."
          echo "The existing deploy-to-s3.yml workflow will handle S3 upload."
